<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Oyinda – Your AI Financial Companion</title>
  <!-- Mono Connect Widget -->
  <script src="https://connect.withmono.com/connect.js"></script>
  <!-- WalletConnect & ethers -->
  <script src="https://unpkg.com/@walletconnect/web3-provider@1.7.8/dist/umd/index.min.js"></script>
  <script src="https://unpkg.com/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           background: #f3f4f6; display: flex; height: 100vh; overflow: hidden; }
    /* ---------- Sidebar (left) ---------- */
    .sidebar {
      width: 260px; background: white; border-right: 1px solid #e5e7eb;
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    .sidebar .logo-area {
      padding: 16px; display: flex; align-items: center; gap: 8px;
      font-size: 20px; font-weight: bold; color: #10b981;
    }
    .sidebar .logo-icon { font-size: 28px; }
    /* Quick actions (icons) */
    .sidebar .quick-actions {
      display: flex; gap: 12px; padding: 0 16px 16px;
    }
    .sidebar .quick-actions .action-icon {
      width: 36px; height: 36px; border-radius: 8px;
      background: #f3f4f6; display: flex; align-items: center;
      justify-content: center; cursor: pointer; transition: background 0.2s;
    }
    .sidebar .quick-actions .action-icon:hover { background: #e5e7eb; }
    /* Transaction history */
    .sidebar .history {
      flex: 1; overflow-y: auto; padding: 0 16px; font-size: 13px;
    }
    .sidebar .history .date-header {
      color: #9ca3af; font-weight: 600; margin-top: 16px; margin-bottom: 8px;
    }
    .sidebar .history .tx-item {
      padding: 6px 8px; border-radius: 6px; color: #374151;
      cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sidebar .history .tx-item:hover { background: #f9fafb; }
    /* Connected accounts */
    .sidebar .accounts {
      padding: 0 16px 8px; font-size: 12px;
    }
    .sidebar .accounts .account-item {
      padding: 4px 8px; background: #f0fdf4; border-radius: 4px;
      margin-bottom: 4px; color: #065f46; cursor: pointer;
    }
    /* Footer */
    .sidebar .footer {
      padding: 12px 16px; border-top: 1px solid #e5e7eb;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 13px; color: #6b7280;
    }
    .sidebar .footer .user-info { display: flex; align-items: center; gap: 8px; }
    .sidebar .footer .footer-icons { display: flex; gap: 8px; align-items: center; }
    .sidebar .footer .footer-icon { cursor: pointer; }
    /* ---------- Main chat area ---------- */
    .main {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      background: #f9fafb; position: relative; padding-bottom: 140px;
    }
    .main .chat { flex: 1; overflow-y: auto; padding: 20px; width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 12px; }
    /* Chat messages */
    .msg { max-width: 70%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.4; }
    .msg.user { align-self: flex-end; background: #10b981; color: white; }
    .msg.cfo  { align-self: flex-start; background: white; border: 1px solid #e5e7eb; color: #1f2937; }
    .msg.cfo.warning { border-left: 3px solid #ef4444; color: #ef4444; }
    .msg.cfo.good    { border-left: 3px solid #3b82f6; color: #3b82f6; }
    .msg.cfo.income  { border-left: 3px solid #10b981; color: #10b981; }
    .msg.error { align-self: flex-start; background: #fee2e2; color: #ef4444; }
    /* Floating input area – centered, higher */
    .input-area {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      width: calc(100% - 320px); max-width: 700px; min-width: 400px;
      background: white; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      border: 1px solid #e5e7eb; padding: 16px 16px 12px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .input-area textarea {
      width: 100%; border: none; resize: none; outline: none;
      font-size: 15px; line-height: 1.5; height: 60px; padding: 4px 0;
      background: transparent; font-family: inherit;
    }
    .input-area .tools {
      display: flex; align-items: center; justify-content: space-between;
    }
    .input-area .tools .left-tools, .input-area .tools .right-tools {
      display: flex; align-items: center; gap: 10px;
    }
    .tool-icon {
      background: none; border: none; cursor: pointer; font-size: 18px;
      color: #6b7280; transition: color 0.2s; display: flex; align-items: center;
    }
    .tool-icon:hover { color: #374151; }
    .analyze-toggle {
      display: flex; align-items: center; gap: 4px;
      background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 20px;
      padding: 4px 10px; font-size: 13px; cursor: pointer; color: #374151;
    }
    .send-circle {
      background: #2563eb; color: white; border: none; border-radius: 50%;
      width: 32px; height: 32px; display: flex; align-items: center;
      justify-content: center; cursor: pointer; font-size: 18px;
    }
    /* Overlays */
    .dialog-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%;
                       background: rgba(0,0,0,0.4); justify-content: center; align-items: center; z-index: 20; }
    .dialog { background: white; padding: 24px; border-radius: 16px; width: 320px; }
    .dialog h2 { margin-bottom: 16px; }
    .dialog input { width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #d1d5db; }
    .dialog .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; background: #10b981; color: white; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo-area">
      <span class="logo-icon" id="logoIconSidebar">🦋</span> Oyinda
    </div>
    <!-- Quick action icons instead of new chat -->
    <div class="quick-actions">
      <div class="action-icon" onclick="linkBank()" title="Link Bank">🏦</div>
      <div class="action-icon" onclick="linkExchange()" title="Link Exchange">💹</div>
      <div class="action-icon" onclick="connectWallet()" title="Connect Wallet">👛</div>
    </div>
    <div class="history" id="historyList">
      <!-- Transaction history -->
    </div>
    <div class="accounts" id="accountList">
      <!-- Connected accounts -->
    </div>
    <div class="footer">
      <div class="user-info">
        <span id="userEmailDisplay">Not logged in</span>
      </div>
      <div class="footer-icons">
        <span class="footer-icon" id="loginLogoutIcon" onclick="handleLoginLogout()" title="Login">🔑</span>
        <span class="footer-icon" onclick="downloadStatement()" title="Settings">⚙️</span>
      </div>
    </div>
  </div>

  <!-- Main chat area -->
  <div class="main">
    <div class="chat" id="chat"></div>
    <!-- Floating input area -->
    <div class="input-area">
      <textarea id="userInput" placeholder="Speak with Oyinda!" onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault(); sendMessage();}"></textarea>
      <div class="tools">
        <div class="left-tools">
          <div class="analyze-toggle" id="analyzeToggle" onclick="toggleAnalyze()">
            ✨ Analyze
          </div>
          <button class="tool-icon" onclick="downloadStatement()" title="Download statement">📄</button>
        </div>
        <div class="right-tools">
          <button class="tool-icon" onclick="startVoice()" title="Voice input">🎤</button>
          <button class="send-circle" onclick="sendMessage()">↑</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Auth dialogs (unchanged) -->
  <div class="dialog-overlay" id="loginDialog">
    <div class="dialog">
      <h2>Login</h2>
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPassword" placeholder="Password">
      <button class="btn" onclick="doLogin()">Login</button>
      <button class="btn" style="background:#6b7280; margin-top:8px;" onclick="hideDialogs()">Cancel</button>
    </div>
  </div>
  <div class="dialog-overlay" id="registerDialog">
    <div class="dialog">
      <h2>Register</h2>
      <input type="text" id="regName" placeholder="Your name">
      <input type="email" id="regEmail" placeholder="Email">
      <input type="password" id="regPassword" placeholder="Password">
      <button class="btn" onclick="doRegister()">Register</button>
      <button class="btn" style="background:#6b7280; margin-top:8px;" onclick="hideDialogs()">Cancel</button>
    </div>
  </div>

  <script>
    const API = 'https://oyinda-v2.onrender.com';
    const MONO_PUBLIC_KEY = 'test_pk_otw9gnq5i870ipmiyucx'; // your sandbox key
    let token = localStorage.getItem('oyinda_token') || '';
    let userName = localStorage.getItem('oyinda_user') || '';
    let wcProvider = null, ethersProvider = null, signer = null;

    // ---------- UI helpers ----------
    function updateUI() {
      const emailDisplay = document.getElementById('userEmailDisplay');
      const loginLogoutIcon = document.getElementById('loginLogoutIcon');
      if (userName) {
        emailDisplay.textContent = userName;
        loginLogoutIcon.innerHTML = '🔓'; // logout icon
        loginLogoutIcon.onclick = logout;
        // Load data only if token exists
        loadConnectedAccounts();
        loadTransactionHistory();
        fetchHealthScore();
      } else {
        emailDisplay.textContent = 'Not logged in';
        loginLogoutIcon.innerHTML = '🔑'; // login icon
        loginLogoutIcon.onclick = showLogin;
        document.getElementById('historyList').innerHTML = '';
        document.getElementById('accountList').innerHTML = '';
        document.getElementById('logoIconSidebar').textContent = '🦋';
      }
    }

    function handleLoginLogout() {
      if (userName) logout();
      else showLogin();
    }

    async function fetchHealthScore() {
      if (!token) return;
      try {
        const resp = await fetch(`${API}/health`, { headers: { 'Authorization': `Bearer ${token}` } });
        if (resp.ok) {
          const data = await resp.json();
          const logo = data.logo;
          const icon = document.getElementById('logoIconSidebar');
          if (logo === 'eagle') icon.textContent = '🦅';
          else if (logo === 'transition') icon.textContent = '🦋🦅';
          else icon.textContent = '🦋';
        }
      } catch(e) {}
    }

    async function loadConnectedAccounts() {
      if (!token) return;
      // Reuse existing account list logic (e.g., call /command with query)
      try {
        const resp = await fetch(`${API}/command`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ text: 'what accounts do I have' })
        });
        const data = await resp.json();
        const answer = data.answer || '';
        const lines = answer.split('\n').filter(l => l.startsWith('•'));
        const html = lines.map(l => `<div class="account-item">${l}</div>`).join('');
        document.getElementById('accountList').innerHTML = html || '<div style="color:gray;">No accounts linked</div>';
      } catch(e) {}
    }

    async function loadTransactionHistory() {
      if (!token) return;
      try {
        const resp = await fetch(`${API}/transactions?per_page=10`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!resp.ok) return;
        const data = await resp.json();
        const transactions = data.transactions || [];
        const now = new Date();
        const today = now.toISOString().split('T')[0];
        const yesterday = new Date(now - 86400000).toISOString().split('T')[0];
        let grouped = {};
        transactions.forEach(tx => {
          const d = tx.date.split('T')[0];
          if (d === today) grouped['Today'] = grouped['Today'] || [];
          else if (d === yesterday) grouped['Yesterday'] = grouped['Yesterday'] || [];
          else if ((new Date() - new Date(d)) / 86400000 <= 7) grouped['7 Days'] = grouped['7 Days'] || [];
          else if ((new Date() - new Date(d)) / 86400000 <= 30) grouped['30 Days'] = grouped['30 Days'] || [];
          else grouped['Older'] = grouped['Older'] || [];
          if (grouped['Today']) grouped['Today'].push(tx);
          // etc.
        });
        let html = '';
        for (let header of ['Today','Yesterday','7 Days','30 Days','Older']) {
          if (grouped[header]) {
            html += `<div class="date-header">${header}</div>`;
            grouped[header].forEach(tx => {
              html += `<div class="tx-item">${tx.type}: ₦${tx.amount} ${tx.description || ''}</div>`;
            });
          }
        }
        document.getElementById('historyList').innerHTML = html || '<div style="color:gray;">No transactions</div>';
      } catch(e) {}
    }

    // ---------- Auth dialogs ----------
    function showLogin() { document.getElementById('loginDialog').style.display = 'flex'; }
    function showRegister() { document.getElementById('registerDialog').style.display = 'flex'; }
    function hideDialogs() {
      document.getElementById('loginDialog').style.display = 'none';
      document.getElementById('registerDialog').style.display = 'none';
    }

    async function doLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      if (!email || !password) return;
      try {
        const resp = await fetch(`${API}/login`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ email, password })
        });
        if (resp.status === 200) {
          const data = await resp.json();
          token = data.token;
          userName = data.user.name;
          localStorage.setItem('oyinda_token', token);
          localStorage.setItem('oyinda_user', userName);
          updateUI();
          hideDialogs();
          addMessage('cfo', data.message);
        } else {
          alert('Invalid email or password.');
        }
      } catch(e) { alert('Could not reach server.'); }
    }

    async function doRegister() {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value.trim();
      if (!name || !email || !password) return;
      try {
        const resp = await fetch(`${API}/register`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ name, email, password, account_type: 'personal', address: '' })
        });
        if (resp.status === 200) {
          const data = await resp.json();
          token = data.token;
          userName = name;
          localStorage.setItem('oyinda_token', token);
          localStorage.setItem('oyinda_user', userName);
          updateUI();
          hideDialogs();
          addMessage('cfo', data.message);
        } else {
          const err = await resp.json();
          alert(err.error || 'Registration failed.');
        }
      } catch(e) { alert('Could not reach server.'); }
    }

    function logout() {
      token = ''; userName = '';
      localStorage.removeItem('oyinda_token');
      localStorage.removeItem('oyinda_user');
      updateUI();
      document.getElementById('chat').innerHTML = '';
      addMessage('cfo', 'You have been logged out.');
    }

    // ---------- Chat ----------
    function addMessage(role, content, tone = null, eventId = null) {
      const chat = document.getElementById('chat');
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      if (role === 'cfo' && tone) div.classList.add(tone);
      div.textContent = content;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      // (Transfer confirmation omitted for brevity – reuse previous logic if needed)
    }

    async function sendMessage() {
      if (!token) {
        addMessage('error', 'Please login first.');
        return;
      }
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      addMessage('user', text);
      try {
        const resp = await fetch(`${API}/command`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ text })
        });
        if (resp.status === 200) {
          const data = await resp.json();
          const reply = data.message || data.answer || 'Done.';
          const tone = data.tone || null;
          addMessage('cfo', reply, tone);
          // Refresh sidebar data
          loadTransactionHistory();
          loadConnectedAccounts();
        } else if (resp.status === 401) {
          addMessage('error', 'Session expired. Please login again.');
          logout();
        } else {
          const err = await resp.json();
          addMessage('error', err.error || 'Could not process.');
        }
      } catch (e) {
        addMessage('error', 'Network error.');
      }
    }

    // ---------- Voice input ----------
    function startVoice() {
      if (!('webkitSpeechRecognition' in window)) return addMessage('error', 'Voice not supported.');
      const recognition = new webkitSpeechRecognition();
      recognition.lang = 'en-NG';
      recognition.onresult = (e) => { document.getElementById('userInput').value = e.results[0][0].transcript; };
      recognition.onerror = (e) => addMessage('error', 'Voice error: ' + e.error);
      recognition.start();
    }

    // ---------- Bank, Exchange, Wallet icons ----------
    function linkBank() {
      if (!token) return addMessage('error', 'Please login first.');
      const connectFn = window['@mono.co/connect.js'];
      if (!connectFn) return addMessage('error', 'Mono library not loaded.');
      connectFn({
        key: MONO_PUBLIC_KEY,
        onSuccess: async (data) => {
          const resp = await fetch(`${API}/link/mono`, { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}, body: JSON.stringify({code: data.code}) });
          const result = await resp.json();
          addMessage('cfo', result.message || result.error, resp.ok ? 'income' : 'error');
        },
        onClose: () => {},
        onError: (err) => addMessage('error', 'Mono error: ' + err.message)
      });
    }

    async function linkExchange() {
      if (!token) return addMessage('error', 'Please login first.');
      const apiKey = prompt('Binance API Key:');
      const apiSecret = prompt('Binance API Secret:');
      if (!apiKey || !apiSecret) return;
      const resp = await fetch(`${API}/link/exchange`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({provider:'binance', api_key:apiKey, api_secret:apiSecret})
      });
      const data = await resp.json();
      addMessage('cfo', data.message || data.error, resp.ok ? 'income' : 'error');
    }

    async function connectWallet() {
      if (!token) return addMessage('error', 'Please login first.');
      if (!window.WalletConnectProvider || !window.ethers) return addMessage('error', 'WalletConnect library not loaded.');
      try {
        wcProvider = new WalletConnectProvider.default({ rpc: {1:'https://mainnet.infura.io/v3/YOUR_INFURA_ID'} });
        await wcProvider.enable();
        ethersProvider = new ethers.providers.Web3Provider(wcProvider);
        signer = ethersProvider.getSigner();
        const address = await signer.getAddress();
        addMessage('cfo', `Wallet connected: ${address}`, 'income');
        await fetch(`${API}/link/wallet`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ address, network: 'Ethereum' })
        });
      } catch(e) { addMessage('error', 'Wallet connection failed: ' + e.message); }
    }

    async function swapTokens() {
      if (!signer) return addMessage('error', 'Connect wallet first.');
      const tokenIn = prompt('Token in (address):');
      const tokenOut = prompt('Token out (address):');
      const amountIn = prompt('Amount in:');
      if (!tokenIn || !tokenOut || !amountIn) return;
      try {
        const router = new ethers.Contract(
          '0x7a250d5630B4cF539739dF2C5dAcb4c659F2488D',
          ['function swapExactTokensForTokens(uint amountIn, uint amountOutMin, address[] path, address to, uint deadline)'],
          signer
        );
        const path = [tokenIn, tokenOut];
        const deadline = Math.floor(Date.now()/1000) + 60*20;
        const amountInWei = ethers.utils.parseUnits(amountIn, 18);
        const tx = await router.swapExactTokensForTokens(amountInWei, 0, path, await signer.getAddress(), deadline);
        addMessage('cfo', `Swap submitted: ${tx.hash}`, 'income');
        await fetch(`${API}/crypto/wallet/submit`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ tx_hash: tx.hash })
        });
      } catch(e) { addMessage('error', 'Swap failed: ' + e.message); }
    }

    function downloadStatement() {
      const from = prompt('From (YYYY-MM-DD):', '2020-01-01');
      const to = prompt('To (YYYY-MM-DD):', new Date().toISOString().split('T')[0]);
      window.open(`${API}/statement?from=${from}&to=${to}&format=pdf`, '_blank');
    }

    function toggleAnalyze() {
      alert('Analyze feature coming soon – AI will review your financial health.');
    }

    // Initialize UI
    updateUI();
  </script>
</body>
</html>
