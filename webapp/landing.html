<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Oyinda – Your AI Financial Companion</title>
  <script src="https://connect.withmono.com/connect.js"></script>
  <script src="https://unpkg.com/@walletconnect/web3-provider@1.7.8/dist/umd/index.min.js"></script>
  <script src="https://unpkg.com/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           background: linear-gradient(135deg, #0d1b2a 0%, #1b3a4b 100%); color: white;
           display: flex; flex-direction: column; min-height: 100vh; }
    .header { background: rgba(0,0,0,0.3); padding: 15px 20px; display: flex;
              justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .header .logo-area { display: flex; align-items: center; gap: 10px; }
    .header .logo-icon { font-size: 32px; transition: all 0.3s ease; }
    .header h1 { font-size: 24px; color: #00d4aa; }
    .header .buttons { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .btn { padding: 10px 20px; border: none; border-radius: 20px; font-size: 14px;
           font-weight: bold; cursor: pointer; transition: 0.2s; background: #00d4aa; color: #0d1b2a; }
    .btn:hover { opacity: 0.9; }
    .btn-logout { background: #e74c3c; color: white; }
    .btn-link { background: #f39c12; color: #0d1b2a; }
    .chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 75%; padding: 12px 16px; border-radius: 16px; font-size: 15px; line-height: 1.4; }
    .msg.user { align-self: flex-end; background: #00d4aa; color: #0d1b2a; }
    .msg.cfo  { align-self: flex-start; background: rgba(255,255,255,0.1); color: white; }
    .msg.cfo.warning { border-left: 3px solid #e74c3c; color: #e74c3c; }
    .msg.cfo.good    { border-left: 3px solid #3498db; color: #3498db; }
    .msg.cfo.income  { border-left: 3px solid #2ecc71; color: #2ecc71; }
    .msg.error { align-self: flex-start; background: rgba(231,76,60,0.3); color: #e74c3c; }
    .input-area { display: flex; padding: 15px 20px; gap: 10px; background: rgba(0,0,0,0.3); }
    .input-area input { flex:1; padding: 12px 16px; border-radius: 25px; border: none; font-size: 16px; }
    .input-area button { padding: 12px 20px; border-radius: 25px; border: none; background: #00d4aa;
                          color: #0d1b2a; font-weight: bold; font-size: 16px; cursor: pointer; }
    .dialog-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%;
                       background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 10; }
    .dialog { background: #1b3a4b; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; }
    .dialog h2 { margin-bottom: 20px; color: #00d4aa; }
    .dialog input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 10px; border: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-area">
      <span class="logo-icon" id="logoIcon">🦋</span>
      <h1>Oyinda</h1>
    </div>
    <div class="buttons" id="headerButtons">
      <button class="btn" onclick="showLogin()">Login</button>
      <button class="btn" onclick="showRegister()">Register</button>
    </div>
  </div>
  <div class="chat" id="chat"></div>
  <div class="input-area">
    <input type="text" id="userInput" placeholder="Type or speak a transaction..." onkeydown="if(event.key==='Enter')sendMessage()">
    <button onclick="startVoice()" style="background:#f39c12;">🎤</button>
    <button onclick="sendMessage()">Send</button>
  </div>

  <!-- Auth dialogs same as before -->

  <script>
    const API = 'https://oyinda-v2.onrender.com';
    const MONO_PUBLIC_KEY = 'test_pk_otw9gnq5i870ipmiyucx';
    let token = localStorage.getItem('oyinda_token') || '';
    let userName = localStorage.getItem('oyinda_user') || '';
    let pendingTransfers = {};
    let wcProvider = null, ethersProvider = null, signer = null;

    function updateUI() {
      const btns = document.getElementById('headerButtons');
      if (userName) {
        btns.innerHTML = `
          <span style="color:#00d4aa; margin-right:12px">👤 ${userName}</span>
          <button class="btn btn-link" id="linkBankBtn">🔗 Link Bank</button>
          <button class="btn btn-link" onclick="linkExchange()">🏦 Link Exchange</button>
          <button class="btn btn-link" onclick="connectWallet()">🦊 Connect Wallet</button>
          <button class="btn btn-link" onclick="swapTokens()">🔄 Swap</button>
          <button class="btn btn-link" onclick="downloadStatement()">📄 Statement</button>
          <button class="btn btn-logout" onclick="logout()">Logout</button>`;
        document.getElementById('linkBankBtn').addEventListener('click', linkBank);
        fetchHealthScore();
      } else {
        btns.innerHTML = `<button class="btn" onclick="showLogin()">Login</button>
                          <button class="btn" onclick="showRegister()">Register</button>`;
        document.getElementById('logoIcon').textContent = '🦋';
      }
    }

    async function fetchHealthScore() {
      if (!token) return;
      try {
        const resp = await fetch(`${API}/health`, { headers: { 'Authorization': `Bearer ${token}` } });
        if (resp.ok) {
          const data = await resp.json();
          const logo = data.logo;
          const icon = document.getElementById('logoIcon');
          if (logo === 'eagle') icon.textContent = '🦅';
          else if (logo === 'transition') icon.textContent = '🦋🦅';
          else icon.textContent = '🦋';
        }
      } catch(e) {}
    }

    function linkBank() {
      if (!token) return addMessage('error', 'Please login first.');
      const connectFn = window['@mono.co/connect.js'];
      if (!connectFn) return addMessage('error', 'Mono library not loaded.');
      connectFn({
        key: MONO_PUBLIC_KEY,
        onSuccess: async (data) => {
          try {
            const resp = await fetch(`${API}/link/mono`, { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}, body: JSON.stringify({code: data.code}) });
            const result = await resp.json();
            addMessage('cfo', result.message || result.error, resp.ok ? 'income' : 'error');
          } catch(e) { addMessage('error', 'Network error linking bank.'); }
        },
        onClose: () => {},
        onError: (err) => addMessage('error', 'Mono error: ' + err.message)
      });
    }

    async function linkExchange() {
      if (!token) return addMessage('error', 'Please login first.');
      const apiKey = prompt('Binance API Key:');
      const apiSecret = prompt('Binance API Secret:');
      if (!apiKey || !apiSecret) return;
      const resp = await fetch(`${API}/link/exchange`, { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}, body: JSON.stringify({provider:'binance',api_key:apiKey,api_secret:apiSecret}) });
      const data = await resp.json();
      addMessage('cfo', data.message || data.error, resp.ok ? 'income' : 'error');
    }

    async function connectWallet() {
      if (!token) return addMessage('error', 'Please login first.');
      if (!window.WalletConnectProvider || !window.ethers) return addMessage('error', 'WalletConnect library not loaded.');
      try {
        wcProvider = new WalletConnectProvider.default({ rpc: {1:'https://mainnet.infura.io/v3/YOUR_INFURA_ID'} });
        await wcProvider.enable();
        ethersProvider = new ethers.providers.Web3Provider(wcProvider);
        signer = ethersProvider.getSigner();
        const address = await signer.getAddress();
        addMessage('cfo', `Wallet connected: ${address}`, 'income');
        await fetch(`${API}/link/wallet`, { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}, body: JSON.stringify({address, network:'Ethereum'}) });
      } catch(e) { addMessage('error', 'Wallet connection failed: ' + e.message); }
    }

    async function swapTokens() {
      if (!signer) return addMessage('error', 'Connect wallet first.');
      const tokenIn = prompt('Token in (address):');
      const tokenOut = prompt('Token out (address):');
      const amountIn = prompt('Amount in:');
      if (!tokenIn || !tokenOut || !amountIn) return;
      try {
        const router = new ethers.Contract('0x7a250d5630B4cF539739dF2C5dAcb4c659F2488D', ['function swapExactTokensForTokens(uint amountIn, uint amountOutMin, address[] path, address to, uint deadline)'], signer);
        const path = [tokenIn, tokenOut];
        const deadline = Math.floor(Date.now()/1000) + 60*20;
        const amountInWei = ethers.utils.parseUnits(amountIn, 18);
        const tx = await router.swapExactTokensForTokens(amountInWei, 0, path, await signer.getAddress(), deadline);
        addMessage('cfo', `Swap submitted: ${tx.hash}`, 'income');
        await fetch(`${API}/crypto/wallet/submit`, { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}, body: JSON.stringify({tx_hash: tx.hash}) });
      } catch(e) { addMessage('error', 'Swap failed: ' + e.message); }
    }

    function downloadStatement() {
      const from = prompt('From (YYYY-MM-DD):', '2020-01-01');
      const to = prompt('To (YYYY-MM-DD):', new Date().toISOString().split('T')[0]);
      const format = confirm('PDF? (OK for PDF, Cancel for JSON)') ? 'pdf' : 'json';
      window.open(`${API}/statement?from=${from}&to=${to}&format=${format}`, '_blank');
    }

    function startVoice() {
      if (!('webkitSpeechRecognition' in window)) return addMessage('error', 'Voice not supported.');
      const recognition = new webkitSpeechRecognition();
      recognition.lang = 'en-NG';
      recognition.onresult = (e) => { document.getElementById('userInput').value = e.results[0][0].transcript; };
      recognition.onerror = (e) => addMessage('error', 'Voice error: ' + e.error);
      recognition.start();
    }

    // (chat, auth, transfer, confirm functions remain as before...)
  </script>
</body>
</html>
