<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Oyinda – Your AI Financial Companion</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Mono Connect -->
  <script src="https://connect.withmono.com/connect.js"></script>
  <!-- WalletConnect & ethers -->
  <script src="https://unpkg.com/@walletconnect/web3-provider@1.7.8/dist/umd/index.min.js"></script>
  <script src="https://unpkg.com/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message-animate { animation: fadeInUp 0.3s ease; }
    .sidebar-hidden { transform: translateX(-100%); }
    @media (max-width: 768px) {
      .sidebar { position: fixed; z-index: 40; height: 100%; transition: transform 0.3s; }
      .main-area { margin-left: 0 !important; }
    }
  </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">
  <!-- Sidebar -->
  <div id="sidebar" class="w-64 bg-white border-r flex flex-col flex-shrink-0 sidebar-hidden md:translate-x-0 md:static fixed z-40 h-full transition-transform">
    <!-- Logo area -->
    <div class="p-4 flex items-center gap-2 text-xl font-bold text-emerald-600">
      <span id="logoIconSidebar" class="text-2xl">🦋</span> Oyinda
    </div>

    <!-- Quick action icons -->
    <div class="flex gap-3 px-4 mb-4">
      <div onclick="linkBank()" class="w-9 h-9 rounded-lg bg-gray-100 flex items-center justify-center cursor-pointer hover:bg-gray-200" title="Link Bank">
        <!-- Bank icon (Lucide Building) -->
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-700"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      </div>
      <div onclick="linkExchange()" class="w-9 h-9 rounded-lg bg-gray-100 flex items-center justify-center cursor-pointer hover:bg-gray-200" title="Link Exchange">
        <!-- Exchange icon (Lucide ArrowLeftRight) -->
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-700"><path d="M8 3 4 7l4 4"/><path d="M4 7h16"/><path d="m16 21 4-4-4-4"/><path d="M20 17H4"/></svg>
      </div>
      <div onclick="connectWallet()" class="w-9 h-9 rounded-lg bg-gray-100 flex items-center justify-center cursor-pointer hover:bg-gray-200" title="Connect Wallet">
        <!-- Wallet icon (Lucide Wallet) -->
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-700"><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"/><path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"/></svg>
      </div>
    </div>

    <!-- Transaction history -->
    <div class="flex-1 overflow-y-auto px-4 text-sm" id="historyList"></div>

    <!-- Connected accounts -->
    <div class="px-4 pb-2 text-xs" id="accountList"></div>

    <!-- Footer -->
    <div class="p-4 border-t flex items-center justify-between text-sm text-gray-500">
      <span id="userEmailDisplay" class="truncate">Not logged in</span>
      <div class="flex gap-2 items-center">
        <span id="loginLogoutIcon" onclick="handleLoginLogout()" class="cursor-pointer text-lg">🔑</span>
        <span onclick="copyConversation()" class="cursor-pointer text-lg" title="Copy conversation">
          <!-- Copy icon -->
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </span>
      </div>
    </div>
  </div>

  <!-- Main area -->
  <div class="flex-1 flex flex-col main-area md:ml-0 ml-0 relative">
    <!-- Hamburger for mobile -->
    <button class="md:hidden absolute top-4 left-4 z-50 bg-white p-2 rounded shadow" onclick="toggleSidebar()">☰</button>

    <!-- Chat messages -->
    <div id="chat" class="flex-1 overflow-y-auto px-4 py-6 max-w-3xl mx-auto w-full flex flex-col gap-4"></div>

    <!-- Floating input card -->
    <div class="w-full max-w-2xl mx-auto mb-6 px-4">
      <div class="bg-white rounded-2xl shadow-lg border p-3 flex flex-col gap-3">
        <textarea id="userInput" placeholder="Speak with Oyinda!" rows="2" class="w-full resize-none outline-none text-base p-2" onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault(); sendMessage();}"></textarea>
        <div class="flex items-center justify-between">
          <div class="flex gap-2 items-center">
            <div id="analyzeToggle" onclick="toggleAnalyze()" class="flex items-center gap-1 bg-gray-100 hover:bg-gray-200 rounded-full px-3 py-1 text-sm cursor-pointer">✨ Analyze</div>
            <button onclick="downloadStatement()" class="p-1 hover:bg-gray-100 rounded">📄</button>
          </div>
          <div class="flex gap-2 items-center">
            <button onclick="startVoice()" class="p-1 hover:bg-gray-100 rounded text-lg">🎤</button>
            <button onclick="sendMessage()" class="bg-blue-600 text-white rounded-full w-8 h-8 flex items-center justify-center font-bold">↑</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Auth dialogs (unchanged) -->
  <div id="loginDialog" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-20" onclick="if(event.target===this) hideDialogs()">
    <div class="bg-white p-6 rounded-2xl w-80">
      <h2 class="text-xl font-bold mb-4">Login</h2>
      <input id="loginEmail" placeholder="Email" class="w-full mb-3 p-2 border rounded-lg">
      <input id="loginPassword" type="password" placeholder="Password" class="w-full mb-3 p-2 border rounded-lg">
      <button onclick="doLogin()" class="w-full bg-emerald-500 text-white py-2 rounded-lg font-bold">Login</button>
      <button onclick="hideDialogs()" class="w-full mt-2 bg-gray-300 py-2 rounded-lg">Cancel</button>
    </div>
  </div>
  <div id="registerDialog" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-20" onclick="if(event.target===this) hideDialogs()">
    <div class="bg-white p-6 rounded-2xl w-80">
      <h2 class="text-xl font-bold mb-4">Register</h2>
      <input id="regName" placeholder="Your name" class="w-full mb-3 p-2 border rounded-lg">
      <input id="regEmail" placeholder="Email" class="w-full mb-3 p-2 border rounded-lg">
      <input id="regPassword" type="password" placeholder="Password" class="w-full mb-3 p-2 border rounded-lg">
      <button onclick="doRegister()" class="w-full bg-emerald-500 text-white py-2 rounded-lg font-bold">Register</button>
      <button onclick="hideDialogs()" class="w-full mt-2 bg-gray-300 py-2 rounded-lg">Cancel</button>
    </div>
  </div>

  <script>
    // ---------- CONFIG ----------
    const API = 'https://oyinda-v2.onrender.com';
    const MONO_PUBLIC_KEY = 'test_pk_otw9gnq5i870ipmiyucx'; // sandbox
    let token = localStorage.getItem('oyinda_token') || '';
    let userName = localStorage.getItem('oyinda_user') || '';
    let wcProvider = null, ethersProvider = null, signer = null;

    // ---------- UI helpers ----------
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('sidebar-hidden');
    }

    function updateUI() {
      const emailDisplay = document.getElementById('userEmailDisplay');
      const loginLogoutIcon = document.getElementById('loginLogoutIcon');
      if (userName) {
        emailDisplay.textContent = userName;
        loginLogoutIcon.innerHTML = '🔓';
        loginLogoutIcon.onclick = logout;
        loadConnectedAccounts();
        loadTransactionHistory();
        fetchHealthScore();
      } else {
        emailDisplay.textContent = 'Not logged in';
        loginLogoutIcon.innerHTML = '🔑';
        loginLogoutIcon.onclick = showLogin;
        document.getElementById('historyList').innerHTML = '';
        document.getElementById('accountList').innerHTML = '';
        document.getElementById('logoIconSidebar').textContent = '🦋';
      }
    }

    function handleLoginLogout() { if (userName) logout(); else showLogin(); }

    async function fetchHealthScore() {
      if (!token) return;
      try {
        const resp = await fetch(`${API}/health`, { headers: { 'Authorization': `Bearer ${token}` } });
        if (resp.ok) {
          const data = await resp.json();
          const logo = data.logo;
          const icon = document.getElementById('logoIconSidebar');
          if (logo === 'eagle') icon.textContent = '🦅';
          else if (logo === 'transition') icon.textContent = '🦋🦅';
          else icon.textContent = '🦋';
        }
      } catch(e) {}
    }

    async function loadConnectedAccounts() {
      if (!token) return;
      try {
        const resp = await fetch(`${API}/command`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ text: 'what accounts do I have' })
        });
        const data = await resp.json();
        const answer = data.answer || '';
        const lines = answer.split('\n').filter(l => l.startsWith('•'));
        const html = lines.map(l => `<div class="py-1 px-2 bg-green-50 rounded mb-1 text-gray-700">${l}</div>`).join('');
        document.getElementById('accountList').innerHTML = html || '<div class="text-gray-400">No accounts linked</div>';
      } catch(e) {}
    }

    async function loadTransactionHistory() {
      if (!token) return;
      try {
        const resp = await fetch(`${API}/transactions?per_page=10`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!resp.ok) return;
        const data = await resp.json();
        const transactions = data.transactions || [];
        const now = new Date();
        const today = now.toISOString().split('T')[0];
        const yesterday = new Date(now - 86400000).toISOString().split('T')[0];
        let grouped = {};
        transactions.forEach(tx => {
          const d = tx.date.split('T')[0];
          if (d === today) grouped['Today'] = grouped['Today'] || [];
          else if (d === yesterday) grouped['Yesterday'] = grouped['Yesterday'] || [];
          else if ((new Date() - new Date(d)) / 86400000 <= 7) grouped['7 Days'] = grouped['7 Days'] || [];
          else if ((new Date() - new Date(d)) / 86400000 <= 30) grouped['30 Days'] = grouped['30 Days'] || [];
          else grouped['Older'] = grouped['Older'] || [];
          if (grouped['Today']) grouped['Today'].push(tx);
        });
        let html = '';
        for (let header of ['Today','Yesterday','7 Days','30 Days','Older']) {
          if (grouped[header]) {
            html += `<div class="text-xs text-gray-400 font-semibold mt-3 mb-1">${header}</div>`;
            grouped[header].forEach(tx => {
              html += `<div class="text-sm text-gray-700 py-1 cursor-pointer hover:bg-gray-50 rounded px-1">${tx.type}: ₦${tx.amount} <span class="text-gray-400">${tx.description || ''}</span></div>`;
            });
          }
        }
        document.getElementById('historyList').innerHTML = html || '<div class="text-gray-400 text-sm">No transactions</div>';
      } catch(e) {}
    }

    // ---------- Auth ----------
    function showLogin() { document.getElementById('loginDialog').style.display = 'flex'; }
    function showRegister() { document.getElementById('registerDialog').style.display = 'flex'; }
    function hideDialogs() {
      document.getElementById('loginDialog').style.display = 'none';
      document.getElementById('registerDialog').style.display = 'none';
    }

    async function doLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      if (!email || !password) return;
      try {
        const resp = await fetch(`${API}/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email, password}) });
        if (resp.ok) {
          const data = await resp.json();
          token = data.token; userName = data.user.name;
          localStorage.setItem('oyinda_token', token); localStorage.setItem('oyinda_user', userName);
          updateUI(); hideDialogs();
          addMessage('cfo', data.message);
        } else alert('Invalid email or password.');
      } catch(e) { alert('Network error'); }
    }

    async function doRegister() {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value.trim();
      if (!name || !email || !password) return;
      try {
        const resp = await fetch(`${API}/register`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name, email, password, account_type:'personal'}) });
        if (resp.ok) {
          const data = await resp.json();
          token = data.token; userName = name;
          localStorage.setItem('oyinda_token', token); localStorage.setItem('oyinda_user', userName);
          updateUI(); hideDialogs();
          addMessage('cfo', data.message);
        } else alert((await resp.json()).error || 'Registration failed');
      } catch(e) { alert('Network error'); }
    }

    function logout() {
      token = ''; userName = '';
      localStorage.removeItem('oyinda_token'); localStorage.removeItem('oyinda_user');
      updateUI();
      document.getElementById('chat').innerHTML = '';
      addMessage('cfo', 'You have been logged out.');
    }

    // ---------- Messages ----------
    function addMessage(role, content, tone = null) {
      const chat = document.getElementById('chat');
      const div = document.createElement('div');
      div.className = 'message-animate max-w-[80%] px-0 py-1';
      const inner = document.createElement('div');
      if (role === 'user') {
        inner.className = 'text-right font-semibold text-emerald-600 text-lg';
      } else {
        let toneClass = 'text-gray-800 text-base';
        if (tone === 'warning') toneClass = 'text-red-600';
        else if (tone === 'good') toneClass = 'text-blue-600';
        else if (tone === 'income') toneClass = 'text-green-600';
        inner.className = toneClass;
      }
      inner.textContent = content;
      div.appendChild(inner);
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function copyConversation() {
      const messages = [...document.getElementById('chat').children].map(el => el.innerText).join('\n');
      navigator.clipboard.writeText(messages).then(() => alert('Conversation copied!'));
    }

    // ---------- Send ----------
    async function sendMessage() {
      if (!token) { addMessage('cfo', 'Please login first.', 'warning'); return; }
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      addMessage('user', text);
      try {
        const resp = await fetch(`${API}/command`, { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}, body: JSON.stringify({text}) });
        if (resp.ok) {
          const data = await resp.json();
          const reply = data.message || data.answer || 'Done.';
          addMessage('cfo', reply, data.tone || null);
          loadTransactionHistory(); loadConnectedAccounts();
        } else if (resp.status === 401) {
          addMessage('cfo', 'Session expired. Please login again.', 'warning');
          logout();
        } else {
          const err = await resp.json();
          addMessage('cfo', err.error || 'Could not process.', 'warning');
        }
      } catch(e) { addMessage('cfo', 'Network error.', 'warning'); }
    }

    // ---------- Voice ----------
    function startVoice() {
      if (!('webkitSpeechRecognition' in window)) { addMessage('cfo', 'Voice not supported.', 'warning'); return; }
      const recognition = new webkitSpeechRecognition();
      recognition.lang = 'en-NG';
      recognition.onresult = (e) => { document.getElementById('userInput').value = e.results[0][0].transcript; };
      recognition.onerror = (e) => addMessage('cfo', 'Voice error: ' + e.error, 'warning');
      recognition.start();
    }

    // ---------- Link Bank ----------
    function linkBank() {
      if (!token) { addMessage('cfo', 'Please login first.', 'warning'); return; }
      const connectFn = window['@mono.co/connect.js'];
      if (!connectFn) { addMessage('cfo', 'Mono not loaded. Refresh.', 'warning'); return; }
      connectFn({
        key: MONO_PUBLIC_KEY,
        onSuccess: async (data) => {
          const resp = await fetch(`${API}/link/mono`, { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}, body: JSON.stringify({code: data.code}) });
          const result = await resp.json();
          addMessage('cfo', result.message || result.error, resp.ok ? 'income' : 'warning');
        },
        onClose: () => {},
        onError: (err) => addMessage('cfo', 'Mono error: ' + err.message, 'warning')
      });
    }

    // ---------- Link Exchange ----------
    async function linkExchange() {
      if (!token) { addMessage('cfo', 'Please login first.', 'warning'); return; }
      const apiKey = prompt('Binance API Key:'); const apiSecret = prompt('Binance API Secret:');
      if (!apiKey || !apiSecret) return;
      const resp = await fetch(`${API}/link/exchange`, { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}, body: JSON.stringify({provider:'binance',api_key:apiKey,api_secret:apiSecret}) });
      const data = await resp.json();
      addMessage('cfo', data.message || data.error, resp.ok ? 'income' : 'warning');
    }

    // ---------- Connect Wallet ----------
    async function connectWallet() {
      if (!token) { addMessage('cfo', 'Please login first.', 'warning'); return; }
      if (!window.WalletConnectProvider || !window.ethers) { addMessage('cfo', 'WalletConnect not loaded.', 'warning'); return; }
      try {
        wcProvider = new WalletConnectProvider.default({ rpc: {1:'https://mainnet.infura.io/v3/YOUR_INFURA_ID'} });
        await wcProvider.enable();
        ethersProvider = new ethers.providers.Web3Provider(wcProvider);
        signer = ethersProvider.getSigner();
        const address = await signer.getAddress();
        addMessage('cfo', `Wallet connected: ${address}`, 'income');
        await fetch(`${API}/link/wallet`, { method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`}, body: JSON.stringify({address, network:'Ethereum'}) });
      } catch(e) { addMessage('cfo', 'Wallet connection failed. Ensure you have a wallet and try again.', 'warning'); }
    }

    // ---------- Swap ----------
    async function swapTokens() { /* unchanged */ }

    function downloadStatement() {
      const from = prompt('From (YYYY-MM-DD):', '2020-01-01');
      const to = prompt('To (YYYY-MM-DD):', new Date().toISOString().split('T')[0]);
      window.open(`${API}/statement?from=${from}&to=${to}&format=pdf`, '_blank');
    }

    function toggleAnalyze() { addMessage('cfo', 'Analyze feature coming soon – it will assess your financial health.', 'neutral'); }

    // Initialize
    updateUI();
  </script>
</body>
</html>
